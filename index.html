<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f4ee" />
  <title>취준이</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="app__header">
      <!-- 마스코트: 안경 쓴 와들디 -->
      <svg class="app__mascot" width="34" height="34" viewBox="0 0 32 32" aria-label="취준이 마스코트">
        <circle cx="16" cy="15" r="9" fill="#e98c40"/>
        <ellipse cx="10.5" cy="23.5" rx="3.6" ry="2.4" fill="#a6521e"/>
        <ellipse cx="21.5" cy="23.5" rx="3.6" ry="2.4" fill="#a6521e"/>
        <circle cx="8.5" cy="17.5" r="1.5" fill="#f0968c"/>
        <circle cx="23.5" cy="17.5" r="1.5" fill="#f0968c"/>
        <ellipse cx="12" cy="15" rx="1.5" ry="2.4" fill="#20201d"/>
        <ellipse cx="20" cy="15" rx="1.5" ry="2.4" fill="#20201d"/>
        <circle cx="12.4" cy="13.6" r="0.45" fill="#fffdf8"/>
        <circle cx="20.4" cy="13.6" r="0.45" fill="#fffdf8"/>
        <circle cx="12" cy="15" r="3.6" fill="none" stroke="#20201d" stroke-width="0.8"/>
        <circle cx="20" cy="15" r="3.6" fill="none" stroke="#20201d" stroke-width="0.8"/>
        <path d="M15.6 15H16.4M8 15 6.3 14.4M24 15 25.7 14.4" stroke="#20201d" stroke-width="0.7" stroke-linecap="round"/>
      </svg>
      <h1 class="app__logo">취준이</h1>
    </header>

    <!-- 페이지 마운트 영역 -->
    <main id="view" class="app__view"></main>

    <!-- 하단 네비게이션 (핵심 메뉴만) -->
    <nav class="app__nav">
      <button class="navbtn navbtn--active" data-route="dashboard" aria-label="홈">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>
        </svg>
        <span>홈</span>
      </button>
      <button class="navbtn" data-route="schedule" aria-label="일정">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/>
        </svg>
        <span>일정</span>
      </button>
      <button class="navbtn" data-route="jobs" aria-label="공고">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <span>공고</span>
      </button>
    </nav>

    <!-- 일정 추가 (FAB) -->
    <button class="fab" title="일정 추가" aria-label="일정 추가">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
    </button>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
