<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f4ee" />
  <title>취준 일정 헬퍼</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="app__header">
      <img class="app__mascot" src="assets/mascot.png" alt="마스코트" width="32" height="32" />
      <h1 class="app__logo">취준 일정 헬퍼</h1>
    </header>

    <!-- 탭 네비게이션 -->
    <nav class="app__tabs">
      <button class="tab tab--active" data-route="dashboard">대시보드</button>
      <button class="tab" data-route="jobs">공고</button>
      <button class="tab" data-route="exams">자격증</button>
    </nav>

    <!-- 페이지 마운트 영역 -->
    <main id="view" class="app__view"></main>

    <!-- 일정 추가 (FAB) -->
    <button class="fab" title="일정 추가" aria-label="일정 추가">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
    </button>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
