<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f4ee" />
  <title>취준이</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="app__header">
      <!-- 마스코트: 안경 쓴 와들디 (아이콘과 동일한 도트 PNG) -->
      <img class="app__mascot" src="icons/icon-192.png" alt="취준이 마스코트" width="32" height="32" />
      <h1 class="app__logo">취준이</h1>
    </header>

    <!-- 페이지 마운트 영역 -->
    <main id="view" class="app__view"></main>

    <!-- 하단 네비게이션 (핵심 메뉴만) -->
    <nav class="app__nav">
      <button class="navbtn navbtn--active" data-route="dashboard" aria-label="홈">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>
        </svg>
        <span>홈</span>
      </button>
      <button class="navbtn" data-route="schedule" aria-label="일정">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/>
        </svg>
        <span>일정</span>
      </button>
      <button class="navbtn" data-route="jobs" aria-label="공고">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <span>공고</span>
      </button>
    </nav>

  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
