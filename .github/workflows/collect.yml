name: Collect data

# 매일 06:00 KST(21:00 UTC) 자동 수집 + 수동 실행 가능
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Run collector
        run: node scripts/collect.mjs
        env:
          SUPABASE_URL: https://vghkaykcqvihamirnhma.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
