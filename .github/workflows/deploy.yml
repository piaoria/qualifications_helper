name: Deploy to GitHub Pages

# master에 push될 때마다 정적 사이트 배포
on:
  push:
    branches: [master]
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages가 꺼져 있으면 워크플로우가 직접 활성화 (수동 설정 불필요)
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 빌드 없는 정적 사이트 → 루트 전체 업로드
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
